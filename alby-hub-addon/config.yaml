---
name: Alby Hub (Bitcoin Lightning)
version: "0.0.7"
slug: alby_hub
description: >
  Self-custody Bitcoin Lightning Node powered by Alby Hub. BETA WARNING:
  This add-on is beta software; under certain conditions, financial losses
  can occur. Do not use large amounts for testing. Use at your own risk and
  responsibility. Cloud-Mode: connects to an external Alby Hub via NWC
  connection string (no local node required, create an account at
  https://albyhub.com). Expert-Mode: runs Alby Hub fully locally with its own
  Lightning backend
  (LDK embedded, LND, CLN, Phoenixd), including optional NOSTR relay.
url: "https://github.com/northpower25/ha-btc-alby-hub-addon"
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
map:
  - addon_config:rw
  - ssl:ro
  - backup:rw
ports:
  8080/tcp: 8080   # Alby Hub Web UI (Expert-Mode only)
  3334/tcp: 3334   # NOSTR Relay (optional)
ports_description:
  8080/tcp: Alby Hub Web UI & API (nur Expert-Modus)
  3334/tcp: NOSTR Relay WebSocket
ingress: true
ingress_port: 8080
ingress_stream: false
panel_icon: mdi:lightning-bolt
panel_title: Alby Hub
options:
  # ── Einsteiger-Variante (Cloud) ────────────────────────────────────────────
  # Standard-Einstieg: externen Alby Hub per NWC anbinden.
  # NWC-String erzeugen: https://albyhub.com → Apps → Add Connection
  node_mode: "cloud"
  nwc_connection_string: ""

  # ── Experten-Toggle (UI) ───────────────────────────────────────────────────
  # Für die Experten-Variante im UI "Nicht verwendete optionale
  # Konfigurationsoptionen einblenden" aktivieren.
  # Danach:
  #   1) node_mode auf "expert" setzen
  #   2) Experten-Settings unten aktivieren (Zeilen entkommentieren)
  #   3) node_backend als Node-Varianten-Toggle wählen (LDK/LND/CLN/Phoenixd/Cashu)
  #
  # ── Experten-Settings (allgemein) ──────────────────────────────────────────
  # log_level: info                         # Log-Level: trace|debug|info|notice|warning|error|fatal
  # backup_passphrase: ""                   # Optional: verschlüsselt Backups
  # bitcoin_network: mainnet                # Netzwerk: mainnet|testnet|signet|mutinynet
  # node_backend: "LDK"                     # Node-Variante: LDK|LND|CLN|Phoenixd|Cashu
  # tor_enabled: false                      # Leitet ausgehenden Traffic via SOCKS5/Tor
  # tor_socks5_url: socks5h://127.0.0.1:9050 # SOCKS5-Proxy-URL (nur wenn tor_enabled=true)
  # nostr_relay_enabled: false              # Startet lokalen NOSTR-Relay-Proxy (Port 3334)
  # external_access_enabled: false          # Bindet Hub auf 0.0.0.0 (nur mit Firewall)
  # hub_unlock_password: ""                 # Optionales Auto-Unlock-Passwort (Secret)
  #
  # ── Node-Varianten (Toggle via node_backend) ──────────────────────────────
  # LDK (node_backend: LDK)
  #   Keine zusätzlichen Pflichtfelder.
  #
  # LND (node_backend: LND)
  # lnd_rest_url: https://lnd-host:8080     # Pflicht: LND REST URL
  # lnd_macaroon_hex: ""                    # Pflicht: LND Macaroon als HEX
  # lnd_tls_cert: ""                        # Optional: LND TLS-Zertifikat als HEX
  #
  # CLN (node_backend: CLN)
  # cln_rest_url: https://cln-host:3010     # Pflicht: CLN REST URL
  # cln_rune: ""                            # Pflicht: CLN Rune
  #
  # Phoenixd (node_backend: Phoenixd)
  # phoenixd_url: http://phoenixd-host:9740 # Pflicht: Phoenixd URL
  # phoenixd_password: ""                   # Pflicht: Phoenixd API-Passwort
  #
  # Cashu (node_backend: Cashu)
  #   Derzeit keine zusätzlichen Add-on-Felder.

schema:
  node_mode: list(cloud|expert)
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
  backup_passphrase: str?
  nwc_connection_string: password?
  bitcoin_network: list(mainnet|testnet|signet|mutinynet)?
  node_backend: list(LDK|LND|CLN|Phoenixd|Cashu)?
  # ── Experten-/Node-Optionen hinter UI-Toggle (kein Default in options:) ───
  tor_enabled: bool?
  tor_socks5_url: str?
  nostr_relay_enabled: bool?
  external_access_enabled: bool?
  hub_unlock_password: str?
  lnd_rest_url: str?
  lnd_macaroon_hex: str?
  lnd_tls_cert: str?
  cln_rest_url: str?
  cln_rune: str?
  phoenixd_url: str?
  phoenixd_password: str?
environment:
  NODE_MODE: "{{node_mode}}"
  LOG_LEVEL: "{{log_level}}"
  TOR_ENABLED: "{{tor_enabled}}"
  TOR_SOCKS5_URL: "{{tor_socks5_url}}"
  NOSTR_RELAY_ENABLED: "{{nostr_relay_enabled}}"
  BACKUP_PASSPHRASE: "{{backup_passphrase}}"
  EXTERNAL_ACCESS_ENABLED: "{{external_access_enabled}}"
  NWC_CONNECTION_STRING: "{{nwc_connection_string}}"
  BITCOIN_NETWORK: "{{bitcoin_network}}"
  NODE_BACKEND: "{{node_backend}}"
  HUB_UNLOCK_PASSWORD: "{{hub_unlock_password}}"
  LND_REST_URL: "{{lnd_rest_url}}"
  LND_MACAROON_HEX: "{{lnd_macaroon_hex}}"
  LND_TLS_CERT: "{{lnd_tls_cert}}"
  CLN_REST_URL: "{{cln_rest_url}}"
  CLN_RUNE: "{{cln_rune}}"
  PHOENIXD_URL: "{{phoenixd_url}}"
  PHOENIXD_PASSWORD: "{{phoenixd_password}}"
