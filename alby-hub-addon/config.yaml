---
name: Alby Hub (Bitcoin Lightning)
version: "0.0.3"
slug: alby_hub
description: >
  Self-custody Bitcoin Lightning Node powered by Alby Hub. BETA WARNING:
  This add-on is beta software; under certain conditions, financial losses
  can occur. Do not use large amounts for testing. Use at your own risk and
  responsibility. Cloud-Mode: connects to an external Alby Hub via NWC
  connection string (no local node required, create an account at
  https://albyhub.com). Expert-Mode: runs Alby Hub fully locally with its own
  Lightning backend
  (LDK embedded, LND, CLN, Phoenixd), including optional NOSTR relay.
url: "https://github.com/northpower25/ha-btc-alby-hub-addon"
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
map:
  - addon_config:rw
  - ssl:ro
  - backup:rw
ports:
  8080/tcp: 8080   # Alby Hub Web UI (Expert-Mode only)
  3334/tcp: 3334   # NOSTR Relay (optional)
ports_description:
  8080/tcp: Alby Hub Web UI & API (nur Expert-Modus)
  3334/tcp: NOSTR Relay WebSocket
ingress: true
ingress_port: 8080
ingress_stream: false
panel_icon: mdi:lightning-bolt
panel_title: Alby Hub
options:
  # ── Modus-Auswahl ──────────────────────────────────────────────────────────
  # "cloud"  → Kein lokaler Node. NWC-String von albyhub.com oder externem Hub.
  #            Account erstellen: https://albyhub.com
  #            Hub-Dashboard → Apps → Add Connection → NWC-String kopieren
  # "expert" → Lokaler Alby Hub mit eigenem Lightning-Backend (LDK/LND/CLN/…)
  node_mode: "cloud"

  # ── Allgemein ──────────────────────────────────────────────────────────────
  log_level: info
  tor_enabled: false
  tor_socks5_url: "socks5h://127.0.0.1:9050"
  nostr_relay_enabled: false
  backup_passphrase: ""
  external_access_enabled: false

  # ── Cloud-Modus: NWC Connection String ────────────────────────────────────
  # Woher bekomme ich meinen NWC-String?
  #   1. https://albyhub.com → Account erstellen / einloggen
  #   2. Hub-Dashboard → linkes Menü „Apps" → „Add Connection"
  #   3. App-Name z.B. „Home Assistant" eingeben
  #   4. Berechtigungen wählen (get_info, get_balance, list_transactions,
  #      make_invoice, pay_invoice)
  #   5. NWC-String kopieren: nostr+walletconnect://...
  nwc_connection_string: ""

  # ── Expert-Modus: Lightning-Backend & Netzwerk ────────────────────────────
  bitcoin_network: mainnet
  # LDK: embedded, kein externer Node nötig (Standard/Empfehlung)
  # LND: eigene LND-Node (lnd_rest_url + lnd_macaroon_hex erforderlich)
  # CLN: Core Lightning (cln_rest_url + cln_rune erforderlich)
  # Phoenixd: Phoenix-Node (phoenixd_url + phoenixd_password erforderlich)
  node_backend: "LDK"
  hub_unlock_password: ""

  # LND-Backend (nur bei node_backend = LND)
  lnd_rest_url: ""
  lnd_macaroon_hex: ""
  lnd_tls_cert: ""

  # CLN-Backend (nur bei node_backend = CLN)
  cln_rest_url: ""
  cln_rune: ""

  # Phoenixd-Backend (nur bei node_backend = Phoenixd)
  phoenixd_url: ""
  phoenixd_password: ""

schema:
  node_mode: list(cloud|expert)
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  tor_enabled: bool
  tor_socks5_url: str?
  nostr_relay_enabled: bool
  backup_passphrase: str?
  external_access_enabled: bool
  nwc_connection_string: str?
  bitcoin_network: list(mainnet|testnet|signet|mutinynet)
  node_backend: list(LDK|LND|CLN|Phoenixd|Cashu)
  hub_unlock_password: str?
  lnd_rest_url: str?
  lnd_macaroon_hex: str?
  lnd_tls_cert: str?
  cln_rest_url: str?
  cln_rune: str?
  phoenixd_url: str?
  phoenixd_password: str?
environment:
  NODE_MODE: "{{node_mode}}"
  LOG_LEVEL: "{{log_level}}"
  TOR_ENABLED: "{{tor_enabled}}"
  TOR_SOCKS5_URL: "{{tor_socks5_url}}"
  NOSTR_RELAY_ENABLED: "{{nostr_relay_enabled}}"
  BACKUP_PASSPHRASE: "{{backup_passphrase}}"
  EXTERNAL_ACCESS_ENABLED: "{{external_access_enabled}}"
  NWC_CONNECTION_STRING: "{{nwc_connection_string}}"
  BITCOIN_NETWORK: "{{bitcoin_network}}"
  NODE_BACKEND: "{{node_backend}}"
  HUB_UNLOCK_PASSWORD: "{{hub_unlock_password}}"
  LND_REST_URL: "{{lnd_rest_url}}"
  LND_MACAROON_HEX: "{{lnd_macaroon_hex}}"
  LND_TLS_CERT: "{{lnd_tls_cert}}"
  CLN_REST_URL: "{{cln_rest_url}}"
  CLN_RUNE: "{{cln_rune}}"
  PHOENIXD_URL: "{{phoenixd_url}}"
  PHOENIXD_PASSWORD: "{{phoenixd_password}}"
